[pytest]
# Only collect tests from tests/ — this alone keeps scripts/test_llm.py
# (a scratch smoke script with an intentionally-broken import) out of the run.
testpaths = tests

# Auto-mark every `async def test_*` as an asyncio test. Without this, a plain
# async test with no @pytest.mark.asyncio (e.g. test_db_server) is SILENTLY
# SKIPPED — it looks green but never runs, hiding the MCP server from coverage.
# `auto` runs them all; tests that already carry the explicit mark still work.
asyncio_mode = auto

# Pin the async-FIXTURE loop scope explicitly. pytest-asyncio warns when this is
# unset because its default is changing in a future release; "function" matches
# the upcoming default (a fresh event loop per test fixture) and silences the
# PytestDeprecationWarning at the source rather than hiding it.
asyncio_default_fixture_loop_scope = function

# Warning policy. The two ignores below target deprecation messages raised INSIDE
# the third-party `litellm` package (Pydantic-v1 `class Config`, and importlib's
# `open_text`) — they are not our code and only get fixed by upgrading litellm,
# so we silence those two SPECIFIC messages by text. We deliberately do NOT
# blanket-ignore DeprecationWarning, so genuine deprecations in OUR own code
# still surface.
filterwarnings =
    ignore:Support for class-based `config` is deprecated:DeprecationWarning
    ignore:open_text is deprecated:DeprecationWarning

# Scratch agent smoke scripts fire LIVE LLM calls at import/run and must never
# be collected into the suite (they'd hang/charge/rate-limit during collection).
# These are intentionally untracked; listed here so `pytest` "just works".
addopts =
    --ignore=tests/test_base_agent.py
    --ignore=tests/test_filter_agent.py
    --ignore=tests/test_enhanced_agent.py
    --ignore=tests/test_tools_wiring.py
